<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Salv World Cup 2026 — Pundit Cup</title>
<style>
:root{--slate:#37384c;--slate2:#2c2d3e;--snow:#fff;--pear:#77c224;--pear-d:#5fa015;
 --capri:#4a91f2;--ink:#1d1e2a;--muted:#8a8b97;--line:#e7e7ec;--pitch:#1f7a3d;--pitch-d:#14582a;
 --gold:#ffce3a;--rose:#f24abd;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:manipulation}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#11121b;
 -webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior:none}
.app{max-width:520px;margin:0 auto;height:100vh;height:100dvh;background:#f4f5f7;position:relative;
 display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.45);overflow:hidden}
header{background:linear-gradient(135deg,var(--slate),#43445c);color:#fff;padding:calc(10px + env(safe-area-inset-top)) 16px 12px;
 position:sticky;top:0;z-index:20;border-bottom:3px solid var(--pear)}
.hwrap{display:flex;align-items:center;gap:11px}
header img{height:24px;display:block}
.htitle{font-weight:800;font-size:14px;letter-spacing:.3px;line-height:1}
.hsub{font-size:11px;color:#cfd0db;margin-top:3px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hwrap>div:nth-child(2){flex:1;min-width:0}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.muteb{background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:9px;
 font-size:15px;cursor:pointer}
.ring{position:relative;width:42px;height:42px}.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
main{flex:1;min-height:0;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#ptr{position:absolute;top:54px;left:50%;transform:translateX(-50%) scale(.6);z-index:15;width:34px;height:34px;border-radius:50%;
 background:#fff;box-shadow:0 3px 12px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;color:var(--pitch);
 font-size:19px;font-weight:900;opacity:0;pointer-events:none;transition:opacity .15s,transform .15s}
#ptr.show{opacity:1}
#ptr.loading>div{animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
/* ===== PLAY ARENA ===== */
.arena{padding:10px 12px 14px;display:flex;flex-direction:column;flex:1}
.matchmeta{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 8px}
.matchmeta .mc{font-size:12px;font-weight:800;color:var(--slate)}
.matchmeta .gp{font-size:11px;font-weight:700;color:#fff;background:var(--pitch);padding:3px 9px;border-radius:20px}
.scoreboard{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.tcard{flex:1;display:flex;align-items:center;gap:7px;background:#fff;border:2px solid var(--line);border-radius:14px;padding:8px 9px;min-width:0}
.tcard.away{flex-direction:row-reverse;text-align:right}
.tcard.h{border-color:#bfe6a3}.tcard.a{border-color:#b9d4fb}
.tcard .tf{font-size:24px;flex:none}
.tcard .tn{font-size:12px;font-weight:800;color:var(--slate);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1;min-width:0}
.tcard .num{font-size:28px;font-weight:900;color:var(--slate);min-width:24px;text-align:center;flex:none}
.tcard .minus{width:30px;height:30px;border-radius:8px;border:none;background:#eef0f3;color:var(--slate);font-size:18px;font-weight:800;cursor:pointer;flex:none}
.sep{font-size:16px;font-weight:900;color:var(--muted);flex:none}
.pitch{position:relative;flex:1;min-height:330px;border-radius:18px;overflow:hidden;margin-top:2px;touch-action:none;
 background:linear-gradient(#2c9a4f,#1f7a3d 55%,#176430);box-shadow:inset 0 0 0 3px rgba(255,255,255,.10)}
.pitch .stripes{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 34px,rgba(255,255,255,.05) 34px 68px)}
.goalzone{position:absolute;top:16px;width:40%;height:118px;border:5px solid #fff;border-bottom:none;border-radius:6px 6px 0 0;
 background:repeating-linear-gradient(90deg,rgba(255,255,255,.16) 0 1px,transparent 1px 13px),repeating-linear-gradient(0deg,rgba(255,255,255,.16) 0 1px,transparent 1px 13px);
 display:flex;align-items:flex-end;justify-content:center;transition:box-shadow .12s,background .12s}
.goalzone.h{left:5%;border-color:#c6f2a4}
.goalzone.a{right:5%;border-color:#a7cdfb}
.goalzone .glabel{margin-bottom:7px;background:rgba(0,0,0,.4);color:#fff;font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.goalzone.hot{box-shadow:inset 0 0 0 4px var(--gold);background:rgba(255,206,58,.20)}
.netflash{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.75),transparent 62%);opacity:0;pointer-events:none}
.taphint{position:absolute;bottom:62px;left:0;right:0;text-align:center;color:rgba(255,255,255,.92);
 font-size:12px;font-weight:800;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.ball{position:absolute;width:40px;height:40px;font-size:36px;line-height:40px;text-align:center;left:50%;bottom:12px;
 transform:translateX(-50%);cursor:grab;touch-action:none;user-select:none;z-index:5;filter:drop-shadow(0 4px 5px rgba(0,0,0,.35))}
.ball.grab{cursor:grabbing}
.plusone{position:absolute;font-weight:900;color:#fff;font-size:24px;text-shadow:0 2px 6px rgba(0,0,0,.4);
 pointer-events:none;animation:floatup .8s ease-out forwards;z-index:6}
@keyframes floatup{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-50px) scale(1.4)}}
.playctrl{display:flex;gap:9px;margin-top:11px;align-items:center}
.btn{border:none;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:800;cursor:pointer;
 background:var(--pear);color:#143006;transition:transform .06s;flex:1}
.btn:active{transform:scale(.98)}
.btn.ghost{background:#e9eaef;color:var(--slate)}
.btn.ghost:active{transform:scale(.98)}
.btn.sm{flex:none;width:auto;padding:10px 16px;font-size:13.5px;border-radius:12px}
.subrow{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:0 2px}
.linkbtn{background:none;border:none;color:var(--capri);font-weight:800;font-size:13px;cursor:pointer;padding:6px 4px}
.linkbtn:disabled{opacity:.32;cursor:default}
.donepred{font-size:11px;font-weight:800;color:var(--pitch);background:#e3f6d6;padding:3px 9px;border-radius:20px}
.donepred.lock{color:#8a6400;background:#fff2cf}
.minus:disabled,.sbtn:disabled{opacity:.35;cursor:default}
.lockpanel{flex:1;min-height:210px;border-radius:18px;margin-top:2px;background:#eef0f3;border:2px dashed #cdd0d8;
 display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;text-align:center;padding:22px}
.lockpanel .lockicon{font-size:42px}
.lockpanel .locktitle{font-weight:800;color:var(--slate);font-size:14px}
.lockpanel .ftline{font-weight:800;color:var(--pitch);font-size:15px}
.lockpanel .yourpick{font-size:13px;color:var(--muted);font-weight:700}
/* ===== FORM ===== */
.fwrap{padding:10px 12px 16px}
.backbar{display:flex;justify-content:space-between;align-items:center;margin:2px 2px 8px}
.grouphdr{display:flex;align-items:center;gap:9px;margin:16px 4px 8px;font-weight:900;color:var(--slate)}
.grouphdr .gp{background:var(--pitch);color:#fff;width:25px;height:25px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px}
.match{background:#fff;border-radius:14px;padding:10px 11px 12px;margin:8px 0;box-shadow:0 2px 8px rgba(40,40,60,.06);border:1px solid #eef0f3}
.mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.mtag{font-size:10px;font-weight:800;color:#fff;background:var(--capri);padding:3px 8px;border-radius:20px}
.mtag.md2{background:#7a6cf0}.mtag.md3{background:var(--rose)}
.mpts{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px}
.mpts.hit{background:#e3f6d6;color:#2f6d0c}.mpts.par{background:#fff2cf;color:#8a6400}.mpts.miss{background:#fde2e2;color:#a23}.mpts.res{background:#eef0f3;color:#555}
.row{display:flex;align-items:center;gap:8px}
.side{flex:1;display:flex;align-items:center;gap:8px;min-width:0}.side.away{flex-direction:row-reverse;text-align:right}
.flag{font-size:27px;width:34px;text-align:center;flex:none}.tname{font-weight:700;font-size:13.5px;overflow:hidden}
.fmteams{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;font-weight:700;font-size:14px;color:var(--ink);margin:2px 4px 11px}
.fmteams .fl{font-size:20px}
.fmteams i{font-style:normal;color:var(--muted);font-weight:800;font-size:11px;margin:0 2px}
.fmsteps{display:flex;align-items:center;justify-content:center;gap:18px}
.fmsteps .vs{font-size:18px;font-weight:900;color:var(--muted)}
.koline{text-align:center;font-size:12px;color:var(--muted);font-weight:700;margin:0 0 6px}
.kobadge{font-size:11px;font-weight:800;color:var(--capri);background:#eef5ff;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pens{margin-top:10px;background:#fff;border:1px dashed #cdd0d8;border-radius:14px;padding:10px}
.penlbl{font-size:12px;font-weight:800;color:var(--slate);text-align:center;margin-bottom:7px}
.penlbl span{font-weight:600;color:var(--muted);font-size:11px}
.penrow{display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap}
.penrow .pteam{font-size:12px;font-weight:800;color:var(--slate);min-width:46px;text-align:center}
.penform{margin-top:8px;justify-content:center}
.penlbl2{font-size:11px;font-weight:800;color:var(--muted);align-self:center;margin-right:6px}
.step{display:flex;align-items:center;gap:7px;flex:none}
.sbtn{width:40px;height:40px;border-radius:10px;border:none;background:#eef0f3;color:var(--slate);font-size:22px;font-weight:800;cursor:pointer}
.sval{width:36px;text-align:center;font-size:22px;font-weight:900;color:var(--slate)}.sval.empty{color:#c7c9d2}
.vs{font-size:10px;font-weight:800;color:var(--muted)}
.actual{text-align:center;font-size:11px;color:var(--pitch);font-weight:800;margin-top:7px}
/* ===== TABLE / RESULTS ===== */
.pad{padding:12px 12px 16px}
.section-intro{color:var(--muted);font-size:12.5px;margin:2px 6px 8px;text-align:center}
.lbcard{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(40,40,60,.06)}
.lbrow{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid #f0f1f4}
.lbrow:last-child{border-bottom:none}.lbrow.me{background:linear-gradient(90deg,#f3fae9,#fff);border-left:4px solid var(--pear)}
.rk{width:28px;font-weight:900;color:var(--slate);font-size:15px;text-align:center}
.lbname{flex:1;font-weight:700}.tagme{font-size:10px;background:var(--pear);color:#143006;padding:2px 7px;border-radius:20px;margin-left:6px;font-weight:800}
.lbpts{font-weight:900;color:var(--pitch);font-size:16px}.lbpts span{font-size:11px;color:var(--muted)}
.lbrow{cursor:pointer}.lbrow .chev{color:#c2c4cc;font-weight:900;font-size:18px;margin-left:2px}.lbrow:active{background:#eef0f3}
.rfrow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:11px 13px;margin:8px 0;box-shadow:0 2px 8px rgba(40,40,60,.05)}
.rfteams{flex:1;font-weight:700;font-size:13px}.rfteams small{color:var(--muted)}
.rfscore{font-weight:900;color:var(--slate);font-size:15px;background:#eef0f3;padding:4px 9px;border-radius:8px}
.rfbadge{font-size:11px;font-weight:800;padding:4px 9px;border-radius:20px}
.empty-state{text-align:center;color:var(--muted);padding:46px 20px;font-size:14px}.empty-state .b{font-size:38px;opacity:.5}
.demoflag{background:#fff4d6;color:#8a6400;font-size:11px;font-weight:700;text-align:center;padding:7px;border-radius:10px;margin:0 0 4px}
/* nav */
nav{position:sticky;bottom:0;background:#fff;border-top:1px solid #e7e7ec;display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;padding:11px 0 13px;cursor:pointer;color:var(--muted);font-size:11.5px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:54px}
nav button .ic{font-size:20px}nav button.on{color:var(--pitch)}
/* gate */
.gate{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;
 background:radial-gradient(120% 80% at 50% 0%,#43445c,#1f2030 60%);padding:24px}
.gate .stripes2{position:absolute;inset:0;opacity:.08;background:repeating-linear-gradient(90deg,transparent 0 38px,#fff 38px 40px)}
.card-gate{position:relative;background:#fff;border-radius:22px;padding:30px 24px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.45);max-height:88dvh;overflow:auto}
.card-gate .b{font-size:42px}.card-gate h1{font-size:23px;margin:8px 0 2px;color:var(--slate);font-weight:900}
.card-gate p{color:var(--muted);font-size:13px;margin:0 0 18px;line-height:1.5}
.field{text-align:left}.field label{font-size:12px;font-weight:700;color:var(--slate)}
input[type=text]{width:100%;margin-top:7px;padding:14px 15px;border:2px solid var(--line);border-radius:13px;font-size:16px;outline:none}
input[type=text]:focus{border-color:var(--capri)}
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--slate);color:#fff;padding:11px 18px;border-radius:30px;font-weight:800;font-size:13.5px;opacity:0;transition:.3s;z-index:50;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
canvas#cf{position:fixed;inset:0;pointer-events:none;z-index:55}
.hidden{display:none!important}
.lvlup{position:fixed;left:50%;top:40%;transform:translateX(-50%);z-index:56;background:var(--gold);color:#5a3b00;
 font-weight:900;padding:14px 22px;border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.35);opacity:0;pointer-events:none;font-size:15px;text-align:center}
.lvlup.show{animation:pop 1.8s ease forwards}
@keyframes pop{0%{opacity:0;transform:translateX(-50%) scale(.6)}15%{opacity:1;transform:translateX(-50%) scale(1.08)}30%{transform:translateX(-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1)}}
@media (max-height:720px){.pitch{min-height:240px}.taphint{bottom:52px}.arena{padding-bottom:8px}.ball{width:36px;height:36px;font-size:32px}}
@media (max-width:360px){.tcard{padding:7px 7px;gap:5px}.tcard .tn{font-size:11px}.tcard .num{font-size:24px}.htitle{font-size:13px}}
</style>
</head>

function started(f){const t=koMs(f);return t!=null&&Date.now()>=t;}
function isLocked(f){return started(f)||!!Store.results()[f.n];}
function fmtKO(iso){try{return new Date(iso).toLocaleString([], {weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function fmtKOshort(iso){try{return new Date(iso).toLocaleString([], {weekday:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function fmtDay(iso){try{return new Date(iso).toLocaleDateString([], {weekday:'long',day:'numeric',month:'long'});}catch(e){return'';}}
const LS={get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v)}catch(e){return d}},
          set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
let LIVE=false;const SERVER={results:null,players:null};let postT=null;
const Store={
 name(){return LS.get('swc_name',null)},setName(n){LS.set('swc_name',n)},
 preds(){return LS.get('swc_preds',{})},
 savePreds(p){LS.set('swc_preds',p);if(LIVE){clearTimeout(postT);postT=setTimeout(()=>{
   fetch('/api/predict',{method:'POST',headers:{'Content-Type':'application/json'},
   body:JSON.stringify({name:Store.name(),preds:Store.preds()})}).catch(()=>{});},600);}},
 results(){return (LIVE&&SERVER.results)?SERVER.results:SEED_RESULTS;},
 leaderboard(nm,pts){
   if(LIVE&&SERVER.players){const res=Store.results();
     let rows=SERVER.players.map(pl=>{let t=0;for(const f of FIXTURES){const s=scoreFor(pl.preds[f.n],res[f.n]);if(s)t+=s;}
        return{name:pl.name,pts:t,me:(pl.name===nm)};});
     if(!rows.some(r=>r.me))rows.push({name:nm,pts:pts,me:true});
     rows.sort((a,b)=>b.pts-a.pts||(a.me?-1:1));return rows;}
   const r=DEMO_PLAYERS.map(p=>({name:p.name,pts:p.pts,me:false}));
   r.push({name:nm,pts:pts,me:true});r.sort((a,b)=>b.pts-a.pts||(a.me?-1:1));return r;}
};
function scoreFor(p,res){if(!res||!p||p.h==null||p.a==null)return null;
 let pts=(p.h===res.h&&p.a===res.a)?3:(Math.sign(p.h-p.a)===Math.sign(res.h-res.a)?1:0);
 if(res.pw&&p.h===p.a&&p.ph!=null&&p.pa!=null&&p.ph!==p.pa&&(p.ph>p.pa?'h':'a')===res.pw)pts+=1;
 return pts;}
function penStr(o){return (o&&o.ph!=null&&o.pa!=null&&o.h===o.a)?` (${o.ph}–${o.pa})`:'';}
function myTotal(){const p=Store.preds(),r=Store.results();let t=0;for(const f of FIXTURES){const s=scoreFor(p[f.n],r[f.n]);if(s)t+=s;}return t;}
function predictedCount(){const p=Store.preds();let c=0;for(const f of FIXTURES){const x=p[f.n];if(x&&x.h!=null&&x.a!=null)c++;}return c;}
function streak(){const p=Store.preds(),r=Store.results();let s=0;
 for(const f of FIXTURES){if(!r[f.n])continue;const sc=scoreFor(p[f.n],r[f.n]);if(sc&&sc>0)s++;else if(p[f.n]&&p[f.n].h!=null)s=0;}return s;}
const LEVELS=[[0,"Rookie"],[60,"Analyst"],[150,"Pundit"],[300,"Tactician"],[480,"Oracle"],[720,"Legend"]];
function xp(){return predictedCount()*10+myTotal()*8;}
function levelInfo(){const x=xp();let i=0;for(let k=0;k<LEVELS.length;k++)if(x>=LEVELS[k][0])i=k;
 const cur=LEVELS[i],nxt=LEVELS[i+1];const into=x-cur[0];const span=nxt?nxt[0]-cur[0]:1;
 return{lvl:i+1,title:cur[1],frac:nxt?Math.min(1,into/span):1,x};}

/* sound */
let muted=LS.get('swc_mute',false),actx=null;
function ac(){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();return actx}catch(e){return null}}
function sfx(kind){if(muted)return;const c=ac();if(!c)return;try{
 if(kind==='kick'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.type='triangle';o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(70,c.currentTime+.14);
  g.gain.setValueAtTime(.25,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);o.start();o.stop(c.currentTime+.18);}
 else if(kind==='cheer'){[523,659,784,1046].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.type='square';o.frequency.value=f;const t=c.currentTime+i*.08;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.18,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.2);o.start(t);o.stop(t+.22);});}
}catch(e){}}

/* ui state */
let TAB='play',mode='play',idx=0,playTeam='h',cur={h:0,a:0},shooting=false,prevLvl=1,viewName=null;
const view=document.getElementById('view'),RC=2*Math.PI*17;

function updateHeader(){const li=levelInfo();const st=streak();const nm=Store.name()||'';
 let g=(nm?'👋 '+nm+' · ':'')+li.title+' · Lv.'+li.lvl;if(st>1)g+=' · 🔥'+st;document.getElementById('greet').textContent=g;
 const frac=predictedCount()/FIXTURES.length;
 document.getElementById('ringfg').setAttribute('stroke-dashoffset',(RC*(1-frac)).toFixed(1));
 document.getElementById('ringpct').textContent=Math.round(frac*100)+'%';
 if(li.lvl>prevLvl){levelUp(li.title);}prevLvl=li.lvl;}

function firstUnpredicted(){const p=Store.preds();for(let i=0;i<FIXTURES.length;i++){const x=p[FIXTURES[i].n];if(!(x&&x.h!=null&&x.a!=null))return i;}return 0;}
function firstUpcoming(){for(let i=0;i<FIXTURES.length;i++){if(!isLocked(FIXTURES[i]))return i;}return FIXTURES.length-1;}

/* ===== PLAY ===== */
function playView(){
 const f=FIXTURES[idx];const p=Store.preds()[f.n];const predicted=!!(p&&p.h!=null);const isKO=!f.group;
 cur=predicted?{h:p.h,a:p.a,ph:p.ph!=null?p.ph:0,pa:p.pa!=null?p.pa:0}:{h:0,a:0,ph:0,pa:0};
 const res=Store.results()[f.n];const locked=isLocked(f);
 const sc=(res&&predicted)?scoreFor(cur,res):null;
 const dh=(locked&&!predicted)?'–':cur.h,da=(locked&&!predicted)?'–':cur.a;
 const arena=`<div class="arena">
  <div class="matchmeta"><span class="mc">Match ${idx+1} of ${FIXTURES.length}</span>
   <span class="gp">${f.group?('Group '+f.group+' · '+f.round):f.round}</span></div>
  <div class="scoreboard">
   <div class="tcard h"><span class="tf">${f.hf}</span><span class="tn">${f.home}</span><span class="num" id="sbh">${dh}</span><button class="minus" data-t="h" ${locked?'disabled':''}>–</button></div>
   <span class="sep">:</span>
   <div class="tcard a away"><span class="tf">${f.af}</span><span class="tn">${f.away}</span><span class="num" id="sba">${da}</span><button class="minus" data-t="a" ${locked?'disabled':''}>–</button></div>
  </div>`;
 const pitch=`<div class="pitch" id="pitch">
   <div class="stripes"></div>
   <div class="goalzone h" id="goalH"><div class="netflash"></div><span class="glabel">${f.hf} ${f.ha}</span></div>
   <div class="goalzone a" id="goalA"><div class="netflash"></div><span class="glabel">${f.aa} ${f.af}</span></div>
   <div class="taphint">Drag ⚽ into a team's goal to score</div>
   <div class="ball" id="ball">⚽</div>
  </div>`;
 const lockp=`<div class="lockpanel">
   <div class="lockicon">🔒</div>
   <div class="locktitle">Kicked off — your pick is locked</div>
   ${res?`<div class="ftline">FT&nbsp; ${f.hf} ${f.home} ${res.h}–${res.a}${penStr(res)} ${f.away} ${f.af}</div>`:`<div class="ftline" style="color:var(--muted)">Result coming soon…</div>`}
   ${predicted?`<div class="yourpick">Your pick ${cur.h}–${cur.a}${penStr(cur)}${res?` · <b>${sc>0?('+'+sc+' pts'):'0 pts'}</b>`:''}</div>`:`<div class="yourpick">You didn't predict this one.</div>`}
  </div>`;
 const ctrl=locked
   ?`<button class="btn" data-act="next">${idx<FIXTURES.length-1?'Next ▶':'Done ▶'}</button>`
   :`<button class="btn" data-act="lock">${predicted?'Update & next ▶':'Lock it in ▶'}</button>`;
 const badge=locked?'<span class="donepred lock">🔒 locked</span>':(predicted?'<span class="donepred">predicted ✓</span>':'<span></span>');
 const koHtml=`<div class="koline">⏱ Kicks off ${fmtKO(f.ko)}</div>`;
 const penPanel=isKO?`<div class="pens"><div class="penlbl">🥅 Shootout score <span>counts only if you call a draw</span></div>
   <div class="penrow"><span class="pteam">${f.hf} ${f.ha}</span>
     <button class="sbtn" data-act="pdec" data-side="ph">–</button><span class="sval" id="pph">${cur.ph}</span><button class="sbtn" data-act="pinc" data-side="ph">+</button>
     <span class="vs">:</span>
     <button class="sbtn" data-act="pdec" data-side="pa">–</button><span class="sval" id="ppa">${cur.pa}</span><button class="sbtn" data-act="pinc" data-side="pa">+</button>
     <span class="pteam">${f.aa} ${f.af}</span></div></div>`:'';
 return arena+(locked?lockp:koHtml+pitch+penPanel)+`
  <div class="playctrl">${ctrl}</div>
  <div class="subrow">
   <button class="linkbtn" data-act="prev" ${idx===0?'disabled':''}>◀ Prev</button>
   ${badge}
   <button class="linkbtn" data-act="skip" ${idx===FIXTURES.length-1?'disabled':''}>Skip ▶</button>
  </div>
  <div class="subrow" style="justify-content:center;margin-top:6px">
   <button class="btn ghost sm" data-act="form">Quick form ⤴</button>
  </div>
 </div>`;
}
let dragging=false;
function wirePlay(){
 const ball=document.getElementById('ball');
 if(ball)ball.addEventListener('pointerdown',startDrag);
 document.querySelectorAll('.minus').forEach(b=>b.addEventListener('click',()=>{
   const t=b.dataset.t;if(cur[t]>0){cur[t]--;document.getElementById(t==='h'?'sbh':'sba').textContent=cur[t];}}));
 document.querySelectorAll('[data-act="pinc"],[data-act="pdec"]').forEach(b=>b.addEventListener('click',()=>{
   const s=b.dataset.side,inc=b.dataset.act==='pinc';cur[s]=Math.max(0,Math.min(9,(cur[s]||0)+(inc?1:-1)));
   document.getElementById(s==='ph'?'pph':'ppa').textContent=cur[s];}));
 document.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>act(b.dataset.act)));
}
function goalAt(cx,cy){const gh=document.getElementById('goalH').getBoundingClientRect();
 const ga=document.getElementById('goalA').getBoundingClientRect();
 if(cx>=gh.left&&cx<=gh.right&&cy>=gh.top&&cy<=gh.bottom)return 'h';
 if(cx>=ga.left&&cx<=ga.right&&cy>=ga.top&&cy<=ga.bottom)return 'a';return null;}
function setHot(t){document.getElementById('goalH').classList.toggle('hot',t==='h');
 document.getElementById('goalA').classList.toggle('hot',t==='a');}
function startDrag(e){if(shooting)return;e.preventDefault();
 const ball=document.getElementById('ball'),pitch=document.getElementById('pitch');
 dragging=true;ball.classList.add('grab');try{ball.setPointerCapture(e.pointerId)}catch(_){}
 const move=ev=>{const r=pitch.getBoundingClientRect();
   ball.style.transition='none';ball.style.bottom='auto';
   ball.style.left=(ev.clientX-r.left)+'px';ball.style.top=(ev.clientY-r.top)+'px';ball.style.transform='translate(-50%,-50%)';
   setHot(goalAt(ev.clientX,ev.clientY));};
 const up=ev=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
   dragging=false;ball.classList.remove('grab');setHot(null);
   const t=goalAt(ev.clientX,ev.clientY);if(t)scoreGoal(t);else resetBall();};
 document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
}
function resetBall(){const ball=document.getElementById('ball'),pitch=document.getElementById('pitch');
 const r=pitch.getBoundingClientRect();
 ball.style.transition='left .28s ease,top .28s ease,transform .28s';
 ball.style.left=(r.width/2)+'px';ball.style.top=(r.height-32)+'px';ball.style.transform='translate(-50%,-50%) rotate(0) scale(1)';}
function scoreGoal(t){shooting=true;
 const ball=document.getElementById('ball'),pitch=document.getElementById('pitch');
 const g=document.getElementById(t==='h'?'goalH':'goalA');
 const gr=g.getBoundingClientRect(),pr=pitch.getBoundingClientRect();
 const tx=gr.left-pr.left+gr.width/2,ty=gr.top-pr.top+gr.height*0.55;
 ball.style.transition='left .22s ease-out,top .22s ease-out,transform .22s';
 ball.style.left=tx+'px';ball.style.top=ty+'px';ball.style.transform='translate(-50%,-50%) scale(.62) rotate(380deg)';
 sfx('kick');
 const fl=g.querySelector('.netflash');fl.style.transition='none';fl.style.opacity='.9';
 requestAnimationFrame(()=>{fl.style.transition='opacity .45s';fl.style.opacity='0';});
 cur[t]++;document.getElementById(t==='h'?'sbh':'sba').textContent=cur[t];
 const po=document.createElement('div');po.className='plusone';po.textContent='+1';po.style.left=tx+'px';po.style.top=ty+'px';
 pitch.appendChild(po);setTimeout(()=>po.remove(),800);
 setTimeout(()=>{resetBall();shooting=false;},430);}
function act(a){const f=FIXTURES[idx];
 if(a==='lock'){const p=Store.preds();p[f.n]=f.group?{h:cur.h,a:cur.a}:{h:cur.h,a:cur.a,ph:cur.ph,pa:cur.pa};Store.savePreds(p);
   confetti();sfx('cheer');updateHeader();
   if(idx<FIXTURES.length-1){idx++;render();}else{toast('All 72 locked in! 🏆');TAB='table';setNav();render();}}
 else if(a==='next'){if(idx<FIXTURES.length-1){idx++;render();}else{TAB='table';setNav();render();}}
 else if(a==='prev'){if(idx>0){idx--;render();}}
 else if(a==='skip'){if(idx<FIXTURES.length-1){idx++;render();}}
 else if(a==='form'){mode='form';render();}
 else if(a==='backplay'){mode='play';render();}
}

/* ===== FORM ===== */
function formView(){
 const p=Store.preds(),r=Store.results();
 let h='<div class="fwrap"><div class="backbar"><button class="btn ghost sm" data-act="backplay">◀ Back to play</button><span class="mc" style="font-weight:800;color:var(--slate)">Quick form</span></div>';
 let cd=null;const curN=FIXTURES[firstUpcoming()].n;
 for(const f of FIXTURES){
  const day=fmtDay(f.ko);
  if(day!==cd){cd=day;h+=`<div class="grouphdr"><span class="gp">📅</span>${day}</div>`;}
  const pr=p[f.n]||{h:null,a:null},res=r[f.n],locked=isLocked(f),isKO=!f.group;const md=f.round==='MD2'?'md2':f.round==='MD3'?'md3':'';
  const anchor=f.n===curN?' id="curmatch"':'';
  let status;
  if(res){const s=scoreFor(pr,res);status=s===3?'<span class="mpts hit">+3</span>':s===1?'<span class="mpts par">+1</span>':(pr.h!=null?'<span class="mpts miss">0</span>':'<span class="mpts res">FT</span>');}
  else if(locked)status='<span class="mpts res">🔒 live</span>';
  else status=`<span class="kobadge">${fmtKOshort(f.ko)}</span>`;
  const dis=locked?'disabled':'';
  h+=`<div class="match"${anchor} data-n="${f.n}"><div class="mtop"><span class="mtag ${md}">${f.group?(f.group+' · '+f.round):f.round}</span>${status}</div>
   <div class="fmteams"><span class="fl">${f.hf}</span> ${f.home} <i>v</i> ${f.away} <span class="fl">${f.af}</span></div>
   <div class="fmsteps">
     <div class="step"><button class="sbtn" data-act="dec" data-side="h" ${dis}>–</button><span class="sval ${pr.h==null?'empty':''}" data-val="h">${pr.h==null?'–':pr.h}</span><button class="sbtn" data-act="inc" data-side="h" ${dis}>+</button></div>
     <span class="vs">:</span>
     <div class="step"><button class="sbtn" data-act="dec" data-side="a" ${dis}>–</button><span class="sval ${pr.a==null?'empty':''}" data-val="a">${pr.a==null?'–':pr.a}</span><button class="sbtn" data-act="inc" data-side="a" ${dis}>+</button></div>
   </div>
   ${isKO?`<div class="fmsteps penform"><span class="penlbl2">Shootout</span>
     <div class="step"><button class="sbtn" data-act="dec" data-side="ph" ${dis}>–</button><span class="sval ${pr.ph==null?'empty':''}" data-val="ph">${pr.ph==null?'0':pr.ph}</span><button class="sbtn" data-act="inc" data-side="ph" ${dis}>+</button></div>
     <span class="vs">:</span>
     <div class="step"><button class="sbtn" data-act="dec" data-side="pa" ${dis}>–</button><span class="sval ${pr.pa==null?'empty':''}" data-val="pa">${pr.pa==null?'0':pr.pa}</span><button class="sbtn" data-act="inc" data-side="pa" ${dis}>+</button></div>
   </div>`:''}
   ${res?`<div class="actual">FT ${f.home} ${res.h}–${res.a}${penStr(res)} ${f.away}</div>`:''}</div>`;}
 h+='</div>';return h;
}

function tableView(){const rows=Store.leaderboard(Store.name(),myTotal());const m=['🥇','🥈','🥉'];
 let h='<div class="pad"><div class="section-intro">'+(LIVE?'Tap a player to see their predictions.':'Standings move as results land. Sample rivals shown for the demo.')+'</div><div class="lbcard">';
 rows.forEach((r,i)=>{h+=`<div class="lbrow ${r.me?'me':''}" data-player="${r.name||''}"><div class="rk">${i<3?m[i]:i+1}</div><div class="lbname">${r.name||'You'}${r.me?'<span class="tagme">you</span>':''}</div><div class="lbpts">${r.pts}<span> pts</span></div><span class="chev">›</span></div>`;});
 h+='</div></div>';return h;}
function playerView(name){
 const isMe=name===Store.name();
 const pl=(SERVER.players||[]).find(p=>p.name===name);
 const preds=isMe?Store.preds():(pl?pl.preds:{});const res=Store.results();
 let total=0;for(const f of FIXTURES){const s=scoreFor(preds[f.n],res[f.n]);if(s)total+=s;}
 let h=`<div class="pad"><div class="backbar"><button class="btn ghost sm" data-act="backtable">◀ Table</button><span class="mc" style="font-weight:800;color:var(--slate)">${name} · ${total} pts</span></div>`;
 let cd=null;
 for(const f of FIXTURES){
  const day=fmtDay(f.ko);if(day!==cd){cd=day;h+=`<div class="grouphdr"><span class="gp">📅</span>${day}</div>`;}
  const locked=isLocked(f),res1=res[f.n],pr=preds[f.n],reveal=isMe||locked;
  let pick,badge='';
  if(reveal&&pr&&pr.h!=null){pick=`${pr.h}–${pr.a}${penStr(pr)}`;if(res1){const s=scoreFor(pr,res1);badge=`<span class="mpts ${s>=3?'hit':s>=1?'par':'miss'}">${s>0?'+'+s:'0'}</span>`;}}
  else if(reveal){pick='<span style="color:var(--muted)">no pick</span>';}
  else{pick='<span style="color:var(--muted)">🔒 hidden until kickoff</span>';}
  const right=res1?`${res1.h}–${res1.a}${penStr(res1)}`:`<span class="kobadge">${fmtKOshort(f.ko)}</span>`;
  h+=`<div class="rfrow"><div class="rfteams">${f.hf} ${f.home} <small>v</small> ${f.away} ${f.af}<br><small>pick: ${pick}</small></div><div class="rfscore">${right}</div>${badge}</div>`;
 }
 h+='</div>';return h;}
function resultsView(){const r=Store.results(),p=Store.preds();const played=FIXTURES.filter(f=>r[f.n]);
 if(!played.length)return '<div class="empty-state"><div class="b">⚽</div><p>No final scores yet. Once matches finish, your hits light up here.</p></div>';
 let h='<div class="pad"><div class="section-intro">How your calls are landing.</div>';
 for(const f of played){const res=r[f.n],pr=p[f.n],s=scoreFor(pr,res);
  let bd='<span class="rfbadge mpts res">no pick</span>';
  if(pr&&pr.h!=null)bd=`<span class="rfbadge mpts ${s>=3?'hit':s>=1?'par':'miss'}">${s>0?'+'+s:'0'}</span>`;
  h+=`<div class="rfrow"><div class="rfteams">${f.hf} ${f.home} <small>v</small> ${f.away} ${f.af}${pr&&pr.h!=null?`<br><small>your call ${pr.h}–${pr.a}${penStr(pr)}</small>`:''}</div><div class="rfscore">${res.h}–${res.a}${penStr(res)}</div>${bd}</div>`;}
 h+='</div>';return h;}

function render(){
 if(TAB==='play'){
   if(mode==='form'){view.innerHTML=formView();
     document.querySelectorAll('[data-act="backplay"]').forEach(b=>b.addEventListener('click',()=>act('backplay')));
     const el=document.getElementById('curmatch');if(el){el.scrollIntoView();const sc=document.getElementById('view');if(sc)sc.scrollTop=Math.max(0,sc.scrollTop-46);}}
   else{view.innerHTML=playView();wirePlay();}}
 else if(TAB==='table'){
   if(viewName){view.innerHTML=playerView(viewName);
     document.querySelectorAll('[data-act="backtable"]').forEach(b=>b.addEventListener('click',()=>{viewName=null;render();}));}
   else{view.innerHTML=tableView();
     document.querySelectorAll('.lbrow').forEach(el=>el.addEventListener('click',()=>{const nm=el.dataset.player;if(nm){viewName=nm;render();}}));}
 }
 else view.innerHTML=resultsView();
 updateHeader();window.scrollTo(0,0);
}

 let v=c[side];v=b.dataset.act==='inc'?(v==null?0:Math.min(9,v+1)):(v==null?0:Math.max(0,v-1));

 document.getElementById('mute').textContent=muted?'🔇':'🔊';if(!muted)sfx('kick');});

/* effects */
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200);}
function levelUp(title){const e=document.getElementById('lvlup');e.innerHTML='⬆️ LEVEL UP<br>'+title;e.classList.remove('show');void e.offsetWidth;e.classList.add('show');sfx('cheer');}
function confetti(){const cv=document.getElementById('cf'),cx=cv.getContext('2d');cv.width=innerWidth;cv.height=innerHeight;
 const cols=['#77c224','#4a91f2','#ffce3a','#f24abd','#fff'];let ps=[];
 for(let i=0;i<150;i++)ps.push({x:innerWidth/2,y:innerHeight*.66,vx:(Math.random()-.5)*15,vy:-(Math.random()*17+6),g:.5+Math.random()*.3,c:cols[i%5],s:5+Math.random()*6,r:Math.random()*6,vr:(Math.random()-.5)*.5});
 let f=0;(function loop(){cx.clearRect(0,0,cv.width,cv.height);f++;ps.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;
  cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cx.restore();});
  if(f<95)requestAnimationFrame(loop);else cx.clearRect(0,0,cv.width,cv.height);})();}

/* gate */
function enter(n){Store.setName(n);
 if(LIVE&&SERVER.players){const sp=SERVER.players.find(p=>p.name===n);
   if(sp&&sp.preds&&Object.keys(sp.preds).length)LS.set('swc_preds',sp.preds);}
 document.getElementById('gate').classList.add('hidden');
 idx=firstUpcoming();prevLvl=levelInfo().lvl;render();}
document.getElementById('startBtn').addEventListener('click',()=>{const n=document.getElementById('nm').value.trim();if(!n){document.getElementById('nm').focus();return;}enter(n);});
document.getElementById('nm').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('startBtn').click();});
document.getElementById('mute').textContent=muted?'🔇':'🔊';
async function refreshData(){
 try{const r=await fetch('/api/state',{cache:'no-store'});
   if(r.ok){const d=await r.json();SERVER.results=d.results||{};SERVER.players=d.players||[];LIVE=true;
     const nm=Store.name();if(nm&&SERVER.players){const sp=SERVER.players.find(p=>p.name===nm);if(sp&&sp.preds&&Object.keys(sp.preds).length)LS.set('swc_preds',sp.preds);}}}catch(e){}
 render();
}
/* pull-to-refresh on the scroll area */
(function(){const PTR=document.getElementById('ptr'),SCR=document.getElementById('view');if(!PTR||!SCR)return;
 let pStart=null,pDist=0,pActive=false,busy=false;
 SCR.addEventListener('touchstart',e=>{if(busy||e.target.closest('.pitch')){pStart=null;return;}pStart=SCR.scrollTop<=0?e.touches[0].clientY:null;pActive=false;pDist=0;},{passive:true});
 SCR.addEventListener('touchmove',e=>{if(pStart==null)return;const dy=e.touches[0].clientY-pStart;
   if(dy>0&&SCR.scrollTop<=0){pActive=true;pDist=Math.min(110,dy);const t=Math.min(1,pDist/70);
     PTR.classList.add('show');PTR.style.transform='translateX(-50%) translateY('+(pDist*0.45)+'px) scale('+(0.6+0.4*t)+') rotate('+(pDist*2.2)+'deg)';
     if(pDist>6)e.preventDefault();}},{passive:false});
 SCR.addEventListener('touchend',async()=>{if(pActive&&pDist>=70&&!busy){busy=true;
     PTR.classList.add('show','loading');PTR.style.transform='translateX(-50%) translateY(22px) scale(1)';
     await refreshData();toast('Refreshed');
     setTimeout(()=>{PTR.classList.remove('show','loading');PTR.style.transform='translateX(-50%) scale(.6)';busy=false;},300);
   }else{PTR.classList.remove('show');PTR.style.transform='translateX(-50%) scale(.6)';}
   pStart=null;pActive=false;pDist=0;});
})();
async function init(){
 try{const r=await fetch('/api/state',{cache:'no-store'});
   if(r.ok){const d=await r.json();SERVER.results=d.results||{};SERVER.players=d.players||[];LIVE=true;}}catch(e){}
 if(Store.name()){document.getElementById('nm').value=Store.name();enter(Store.name());}
}
init();
</script>
